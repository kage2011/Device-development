<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dash Lite</title>
  <style>
    html,body{margin:0;background:#070a14;color:#eaf2ff;font-family:system-ui}
    #wrap{max-width:980px;margin:0 auto;padding:10px}
    canvas{width:100%;height:auto;background:linear-gradient(#131427,#090d19);border:1px solid #3c3f63;border-radius:10px}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:8px 0}
    button{background:#5e6bff;color:#fff;border:0;border-radius:8px;padding:8px 12px}
    .small{opacity:.8;font-size:12px}
  </style>
</head>
<body>
<div id="wrap">
  <h2>Dash Lite (2min stage)</h2>
  <div class="row">
    <button id="start">Start / Restart</button>
    <span id="stat">score:0 best:0 speed:1.0x</span>
  </div>
  <canvas id="game" width="960" height="320"></canvas>
  <div class="small">操作: Space / Click / Tap でジャンプ。トゲ・穴・ブロックあり。ゴースト背景で流れる演出付き。</div>
</div>
<script>
const cvs = document.getElementById('game');
const ctx = cvs.getContext('2d');
const stat = document.getElementById('stat');
const W=cvs.width,H=cvs.height,GROUND=262;

let t=0,running=false,clear=false,score=0,best=Number(localStorage.bestDashLite||0);
let speed=4.05,goalX=39000;
const p={x:120,y:GROUND-26,w:24,h:24,vy:0,on:false,rot:0};
let spikes=[],pads=[],blocks=[],holes=[],ghosts=[],particles=[];
let skulls=[],floaters=[],vspikes=[];

const ac = new (window.AudioContext||window.webkitAudioContext)();
const bgm = new Audio('./bgm.mp3');
bgm.loop = true; bgm.volume=0.35;
function beat(on){ if(!on){bgm.pause();bgm.currentTime=0;return;} ac.resume(); bgm.play().catch(()=>{}); }
function beep(freq=130,dur=0.22,vol=0.05,type='sawtooth'){ const o=ac.createOscillator(),g=ac.createGain(); o.type=type;o.frequency.value=freq;g.gain.value=vol;o.connect(g);g.connect(ac.destination);o.start();g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+dur);o.stop(ac.currentTime+dur+0.01);}

function mkGhosts(){
  ghosts=[
    {x:300,y:70,s:0.5,p:0.3},{x:520,y:120,s:0.7,p:1.1},{x:760,y:55,s:0.45,p:2.0},
    {x:980,y:140,s:0.6,p:2.6},{x:1220,y:80,s:0.8,p:3.4},{x:1460,y:110,s:0.55,p:4.1},
    {x:1700,y:65,s:0.65,p:5.0},{x:1940,y:125,s:0.5,p:5.6},{x:2180,y:90,s:0.75,p:0.9}
  ];
}
function reset(){
  t=0;score=0;clear=false;speed=4.05;goalX=39000;
  p.y=GROUND-p.h; p.vy=0; p.on=true; p.rot=0;
  spikes=[];pads=[];blocks=[];holes=[];particles=[];
  mkGhosts();
  floaters=[
    {x:420,y:GROUND-70,w:28,h:10,a:0,spd:0.035},
    {x:5200,y:GROUND-90,w:30,h:10,a:1.1,spd:0.03},
    {x:9400,y:GROUND-75,w:28,h:10,a:2.0,spd:0.04},
    {x:14100,y:GROUND-85,w:30,h:10,a:0.5,spd:0.032},
    {x:19600,y:GROUND-80,w:28,h:10,a:1.7,spd:0.036},
    {x:25700,y:GROUND-88,w:30,h:10,a:2.4,spd:0.03},
    {x:31800,y:GROUND-78,w:28,h:10,a:1.2,spd:0.038},
    {x:37200,y:GROUND-86,w:30,h:10,a:2.8,spd:0.033}
  ];
  vspikes=[
    {x:6400,y:GROUND-110,w:20,h:20,a:0,amp:22,spd:0.05},
    {x:12300,y:GROUND-120,w:20,h:20,a:1.2,amp:20,spd:0.045},
    {x:17600,y:GROUND-110,w:20,h:20,a:2.0,amp:24,spd:0.05},
    {x:26600,y:GROUND-120,w:20,h:20,a:0.7,amp:20,spd:0.047},
    {x:34100,y:GROUND-115,w:20,h:20,a:1.8,amp:22,spd:0.05}
  ];
  skulls=[
    {x:900,y:205,type:'pirate',s:0.58,l:0.35},{x:1200,y:185,type:'pirate',s:0.9,l:0.6},
    {x:1800,y:198,type:'mage',s:0.62,l:0.4},{x:2400,y:190,type:'pirate',s:0.72,l:0.55},
    {x:3200,y:174,type:'mage',s:0.95,l:0.65},{x:3600,y:165,type:'mage',s:1.0,l:0.7},
    {x:4700,y:202,type:'pirate',s:0.6,l:0.35},{x:5600,y:188,type:'pirate',s:0.8,l:0.55},
    {x:6900,y:150,type:'giant',s:1.4,l:0.8},{x:7600,y:198,type:'mage',s:0.62,l:0.35},
    {x:8600,y:178,type:'pirate',s:0.9,l:0.6},{x:9800,y:178,type:'pirate',s:0.95,l:0.65},
    {x:11200,y:196,type:'mage',s:0.66,l:0.4},{x:12800,y:160,type:'mage',s:1.05,l:0.7},
    {x:14400,y:188,type:'pirate',s:0.82,l:0.55},{x:15700,y:205,type:'pirate',s:0.55,l:0.35},
    {x:17100,y:145,type:'giant',s:1.5,l:0.82},{x:18600,y:182,type:'mage',s:0.9,l:0.62},
    {x:21000,y:180,type:'pirate',s:0.9,l:0.6},{x:22600,y:196,type:'mage',s:0.66,l:0.38},
    {x:24600,y:162,type:'mage',s:1.0,l:0.7},{x:26800,y:188,type:'pirate',s:0.85,l:0.55},
    {x:29100,y:205,type:'pirate',s:0.58,l:0.35},{x:31200,y:176,type:'mage',s:0.93,l:0.62},
    {x:33200,y:148,type:'giant',s:1.35,l:0.78},{x:35000,y:186,type:'pirate',s:0.88,l:0.58},
    {x:36600,y:198,type:'mage',s:0.64,l:0.4},{x:38200,y:172,type:'pirate',s:0.96,l:0.66}
  ];

  // Fixed handcrafted stage (no random).
  holes.push(
    {x:1900,w:80},{x:4300,w:95},{x:7200,w:90},{x:10300,w:85},
    {x:13600,w:95},{x:16700,w:90},{x:19900,w:100},{x:22800,w:90},
    {x:26200,w:95},{x:29150,w:90},{x:32300,w:100},{x:35600,w:90}
  );

  blocks.push(
    {x:2800,w:54,h:34},{x:5400,w:60,h:30},{x:8600,w:58,h:36},
    {x:11800,w:64,h:32},{x:15100,w:60,h:34},{x:18300,w:62,h:30},
    {x:21400,w:58,h:36},{x:24600,w:62,h:34},{x:27600,w:58,h:32},
    {x:30800,w:66,h:30},{x:33800,w:60,h:35},{x:37100,w:58,h:34}
  );

  pads.push(
    {x:3600,w:34},{x:9300,w:34},{x:16050,w:34},{x:22050,w:34},
    {x:25550,w:34},{x:28600,w:34},{x:31750,w:34},{x:35050,w:34}
  );

  spikes.push(
    {x:760,w:26,h:24},{x:980,w:26,h:26},{x:1240,w:50,h:24,double:true},
    {x:1660,w:26,h:24},{x:2360,w:26,h:24},{x:3020,w:26,h:24},{x:3330,w:50,h:24,double:true},
    {x:4780,w:26,h:26},{x:5740,w:26,h:22},{x:6120,w:50,h:24,double:true},
    {x:8030,w:26,h:24},{x:8420,w:26,h:22},{x:8880,w:26,h:24},{x:9700,w:50,h:24,double:true},
    {x:11150,w:26,h:24},{x:11720,w:26,h:22},{x:12480,w:26,h:26},{x:13120,w:50,h:24,double:true},
    {x:14500,w:26,h:24},{x:15580,w:26,h:24},{x:17280,w:50,h:24,double:true},
    {x:18980,w:26,h:24},{x:19720,w:26,h:24},{x:20550,w:26,h:24},{x:21720,w:50,h:24,double:true},
    {x:23600,w:26,h:24},{x:24300,w:26,h:24},{x:25220,w:26,h:24},{x:27050,w:50,h:24,double:true},
    {x:28380,w:26,h:24},{x:29920,w:26,h:22},{x:31250,w:50,h:24,double:true},
    {x:32980,w:26,h:24},{x:34420,w:26,h:24},{x:36100,w:50,h:24,double:true},
    {x:37750,w:26,h:24},{x:38500,w:26,h:24}
  );
}

function jump(){ if(running && p.on){ p.vy=-10.5; p.on=false; } }
function rectHit(a,b){ return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y; }
function spawnExplosion(){ for(let i=0;i<34;i++) particles.push({x:p.x+p.w/2,y:p.y+p.h/2,vx:(Math.random()-0.5)*9,vy:(Math.random()-0.5)*9,r:2+Math.random()*4,a:1,c:['#5cf2ff','#ff63a9','#ffd34d'][i%3]}); }
function gameOver(){ if(!running) return; spawnExplosion(); running=false; beat(false); beep(); best=Math.max(best,score); localStorage.bestDashLite=best; }

function update(){
  if(!running) return;
  t++; score=Math.floor(t/5);
  speed=Math.min(4.9,3.95+t/5500);

  // gravity
  p.vy+=0.56; p.y+=p.vy; p.on=false;

  // move world
  spikes.forEach(o=>o.x-=speed);
  pads.forEach(o=>o.x-=speed);
  blocks.forEach(o=>o.x-=speed);
  holes.forEach(o=>o.x-=speed);
  ghosts.forEach(g=>{g.x-=speed*0.4*g.s; g.p+=0.03*g.s; if(g.x<-80) g.x=W+Math.random()*180;});
  skulls.forEach(s=>{ s.x-=speed*(s.l||0.55); s.p=(s.p||0)+(0.03*(s.l||0.6)); });
  floaters.forEach(f=>{ f.x-=speed; f.a+=f.spd; });
  vspikes.forEach(v=>{ v.x-=speed; v.a+=v.spd; });
  goalX-=speed;

  // ground segments with holes
  let onGround=false;
  const me={x:p.x,y:p.y,w:p.w,h:p.h};
  const touchingHole = holes.some(h=> me.x+me.w>h.x && me.x<h.x+h.w);
  if(!touchingHole && p.y+p.h>=GROUND){ p.y=GROUND-p.h; p.vy=0; onGround=true; }

  // block top collision
  for(const b of blocks){
    const top={x:b.x,y:GROUND-b.h,w:b.w,h:10};
    if(rectHit(me,top) && p.vy>=0 && (p.y+p.h) < (GROUND-b.h+14)){
      p.y=GROUND-b.h-p.h; p.vy=0; onGround=true;
    }
  }

  // moving floating platforms (vertical gimmick)
  for(const f of floaters){
    const fy = f.y + Math.sin(f.a)*18;
    const top={x:f.x,y:fy,w:f.w,h:9};
    if(rectHit(me,top) && p.vy>=0 && (p.y+p.h) < (fy+14)){
      p.y=fy-p.h; p.vy=0; onGround=true;
    }
  }

  // hazards
  for(const s of spikes){
    const hit={x:s.x+2,y:GROUND-s.h,w:s.w-4,h:s.h};
    if(rectHit(me,hit)){ gameOver(); return; }
  }
  for(const b of blocks){ // side hit on block = death for dash-like feel
    const side={x:b.x,y:GROUND-b.h,w:b.w,h:b.h};
    if(rectHit(me,side) && p.y+p.h>GROUND-b.h+12){ gameOver(); return; }
  }
  for(const v of vspikes){
    const vy=v.y+Math.sin(v.a)*v.amp;
    const hit={x:v.x,y:vy,w:v.w,h:v.h};
    if(rectHit(me,hit)){ gameOver(); return; }
  }
  if(me.y>H+40){ gameOver(); return; }

  for(const pd of pads){
    const hit={x:pd.x,y:GROUND-8,w:pd.w,h:8};
    if(rectHit(me,hit) && p.vy>=0){ p.vy=-12.0; }
  }

  p.on=onGround;
  if(!p.on) p.rot+=0.2; else p.rot*=0.75;

  if(goalX < p.x + p.w){ clear=true; running=false; beat(false); best=Math.max(best,score); localStorage.bestDashLite=best; }
}

function tri(x,y,w,h){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+w/2,y-h);ctx.lineTo(x+w,y);ctx.closePath();ctx.fill();}
function drawSkull(s){
  const x=s.x,y=s.y+Math.sin(s.p||0)*10,k=s.s;
  ctx.save();
  ctx.globalAlpha=Math.min(1,0.45 + (s.l||0.6));
  // skull base
  ctx.fillStyle='rgba(236,240,250,0.9)';
  ctx.beginPath(); ctx.ellipse(x,y,18*k,15*k,0,0,Math.PI*2); ctx.fill();
  ctx.fillRect(x-10*k,y+8*k,20*k,9*k);
  // eyes
  ctx.fillStyle='#101426';
  ctx.beginPath(); ctx.arc(x-6*k,y-1*k,3.2*k,0,Math.PI*2); ctx.arc(x+6*k,y-1*k,3.2*k,0,Math.PI*2); ctx.fill();
  // nose
  ctx.beginPath(); ctx.moveTo(x,y+2*k); ctx.lineTo(x-2*k,y+6*k); ctx.lineTo(x+2*k,y+6*k); ctx.closePath(); ctx.fill();
  // type accessories
  if(s.type==='pirate'){
    ctx.fillStyle='#d32f2f'; ctx.fillRect(x-20*k,y-10*k,40*k,6*k);
    ctx.strokeStyle='#5d0d0d'; ctx.lineWidth=2*k; ctx.beginPath(); ctx.moveTo(x-14*k,y-8*k); ctx.lineTo(x+14*k,y-8*k); ctx.stroke();
    ctx.fillStyle='#101426'; ctx.fillRect(x+2*k,y-4*k,8*k,8*k); // eyepatch
  }else if(s.type==='mage'){
    ctx.fillStyle='#7c4dff';
    ctx.beginPath(); ctx.moveTo(x,y-28*k); ctx.lineTo(x-14*k,y-8*k); ctx.lineTo(x+14*k,y-8*k); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ffd54f'; ctx.beginPath(); ctx.arc(x+4*k,y-18*k,2*k,0,Math.PI*2); ctx.fill();
  }else if(s.type==='giant'){
    ctx.strokeStyle='rgba(160,190,255,0.55)'; ctx.lineWidth=4*k;
    ctx.strokeRect(x-28*k,y-24*k,56*k,50*k);
  }
  ctx.restore();
}
function draw(){
  ctx.clearRect(0,0,W,H);

  // ghostly sky layers (skeletal vibe)
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#1a1630'); grad.addColorStop(0.55,'#11152a'); grad.addColorStop(1,'#080b14');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
  ctx.fillStyle=`rgba(166,118,255,${0.06+0.05*Math.sin(t*0.02)})`;
  for(let i=0;i<18;i++) ctx.fillRect((i*80-(t*1.8)%80),0,32,H);

  // distant ruins
  ctx.fillStyle='rgba(70,75,110,0.35)';
  for(let i=0;i<8;i++){
    const x=(i*150-(t*0.7)%150);
    ctx.fillRect(x,180,34,90);
    ctx.fillRect(x+42,160,18,110);
  }

  // drifting mist
  ctx.fillStyle='rgba(190,210,255,0.08)';
  for(let i=0;i<5;i++){
    const x=(i*240-(t*1.1)%240)-40;
    ctx.beginPath(); ctx.ellipse(x,220+Math.sin((t+i*40)*0.01)*8,120,28,0,0,Math.PI*2); ctx.fill();
  }

  // moon + occasional flash
  ctx.fillStyle='rgba(215,230,255,0.18)'; ctx.beginPath(); ctx.arc(820,60,40,0,Math.PI*2); ctx.fill();
  if((t%900)>870){ ctx.fillStyle='rgba(200,230,255,0.12)'; ctx.fillRect(0,0,W,H);} 

  // ghosts
  ghosts.forEach(g=>{
    const y=g.y+Math.sin(g.p)*8;
    ctx.globalAlpha=0.23*g.s;
    ctx.fillStyle='#d3e5ff';
    ctx.beginPath(); ctx.arc(g.x,y,20*g.s,Math.PI,0); ctx.rect(g.x-20*g.s,y,40*g.s,24*g.s); ctx.fill();
    ctx.globalAlpha=1;
  });

  // themed skull set pieces
  skulls.forEach(drawSkull);

  // ground + holes
  ctx.fillStyle='#1de9b6';
  let cursor=0;
  const sorted=[...holes].sort((a,b)=>a.x-b.x);
  for(const h of sorted){
    const x=Math.max(0,h.x), w=Math.max(0,Math.min(W,h.x+h.w)-x);
    if(x>cursor) ctx.fillRect(cursor,GROUND,x-cursor,4);
    cursor=Math.max(cursor,x+w);
  }
  if(cursor<W) ctx.fillRect(cursor,GROUND,W-cursor,4);

  // blocks
  ctx.fillStyle='#8fa6ff';
  blocks.forEach(b=>ctx.fillRect(b.x,GROUND-b.h,b.w,b.h));

  // moving bone platforms (vertical motion)
  floaters.forEach(f=>{
    const fy=f.y+Math.sin(f.a)*18;
    ctx.fillStyle='#dfe7ff';
    ctx.fillRect(f.x,fy,f.w,f.h);
    ctx.fillStyle='#9aa7d8';
    ctx.fillRect(f.x+4,fy+2,6,6);
    ctx.fillRect(f.x+f.w-10,fy+2,6,6);
  });

  // spikes
  ctx.fillStyle='#ff5252';
  spikes.forEach(s=>{ if(s.double){tri(s.x,GROUND,s.w/2,s.h);tri(s.x+s.w/2,GROUND,s.w/2,s.h*0.9);} else tri(s.x,GROUND,s.w,s.h); });

  // vertical moving spikes
  vspikes.forEach(v=>{
    const vy=v.y+Math.sin(v.a)*v.amp;
    tri(v.x,vy+v.h,v.w,v.h);
  });

  // pads
  ctx.fillStyle='#ffd740';
  pads.forEach(p=>ctx.fillRect(p.x,GROUND-6,p.w,6));

  // goal gate
  ctx.fillStyle='#7cffb0'; ctx.fillRect(goalX,GROUND-100,12,100);
  ctx.fillStyle='#d8ffe8'; ctx.fillRect(goalX-10,GROUND-112,36,10);

  // player
  if(running){
    ctx.save(); ctx.translate(p.x+p.w/2,p.y+p.h/2); ctx.rotate(p.rot);
    ctx.fillStyle='#40c4ff'; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    ctx.fillStyle='#fff'; ctx.fillRect(-7,-7,4,4); ctx.fillRect(3,-7,4,4);
    ctx.restore();
  }

  // particles
  for(let i=particles.length-1;i>=0;i--){
    const q=particles[i]; q.x+=q.vx; q.y+=q.vy; q.vy+=0.24; q.a-=0.02;
    ctx.globalAlpha=Math.max(0,q.a); ctx.fillStyle=q.c; ctx.beginPath(); ctx.arc(q.x,q.y,q.r,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
    if(q.a<=0) particles.splice(i,1);
  }

  if(!running){
    ctx.fillStyle='rgba(0,0,0,.42)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff'; ctx.font='bold 34px sans-serif';
    ctx.fillText(clear?'GOAL! Click / Space to Retry':'Click / Space to Start', clear?250:280, 140);
    ctx.font='20px sans-serif'; ctx.fillText('約2分ステージ / ゴースト背景 / 穴・ブロック・トゲ', 245, 180);
  }
  stat.textContent=`score:${score} best:${best} speed:${speed.toFixed(1)}x`;
}

function loop(){ update(); draw(); requestAnimationFrame(loop);} loop();

document.getElementById('start').onclick=()=>{ reset(); running=true; ac.resume(); beat(true); };
window.addEventListener('keydown',e=>{ if(e.code==='Space'){ e.preventDefault(); if(!running){reset();running=true;ac.resume();beat(true);} else jump(); }});
cvs.addEventListener('pointerdown',()=>{ if(!running){reset();running=true;ac.resume();beat(true);} else jump(); });
</script>
</body>
</html>
